<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CPD Suspension Lengths</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: transparent;
      font-family: 'Roboto Condensed', 'Arial Narrow', sans-serif;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 32px 16px;
    }

    .viz-container {
      width: 100%;
      max-width: 900px;
      background: transparent;
      overflow: hidden;
    }

    .viz-container::before {
      content: '';
      display: block;
      height: 4px;
      background: #F4C913;
      width: 100%;
    }

    .viz-header {
      padding: 20px 20px 16px;
    }

    .viz-kicker {
      font-family: 'Gotham', 'Gotham Medium', sans-serif;
      font-weight: 500;
      font-size: 12px;
      color: #404F54;
      opacity: 0.65;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 4px;
    }

    .viz-heading {
      font-family: 'Roboto Condensed', 'Arial Narrow', sans-serif;
      font-size: 22px;
      font-weight: 700;
      color: #404F54;
      line-height: 1.3;
      margin-bottom: 4px;
    }

    .viz-subheading {
      font-family: 'Inter', Arial, sans-serif;
      font-size: 14px;
      font-weight: 500;
      color: #404F54;
      opacity: 0.72;
      line-height: 1.5;
    }

    .chart-body {
      padding: 16px 20px 20px;
    }

    /* Tooltip */
    .bar-tooltip {
      position: fixed;
      pointer-events: none;
      background: #404F54;
      color: #fff;
      font-family: 'Inter', Arial, sans-serif;
      font-size: 0.75rem;
      line-height: 1.5;
      padding: 12px 16px;
      border-radius: 2px;
      max-width: 220px;
      opacity: 0;
      transition: opacity 0.15s;
      z-index: 100;
      box-shadow: 0 4px 16px rgba(0,0,0,0.18);
    }

    .bar-tooltip.visible { opacity: 1; }

    .bar-tooltip .tt-title {
      font-weight: 700;
      font-size: 13px;
      display: block;
      margin-bottom: 1px;
    }

    .bar-tooltip .tt-detail {
      font-size: 0.72rem;
      opacity: 0.8;
    }

    /* Vertical bar chart */
    .chart-area {
      display: flex;
      gap: 8px;
    }

    .y-axis {
      position: relative;
      width: 30px;
      flex-shrink: 0;
      height: 260px;
    }

    .y-tick-label {
      position: absolute;
      right: 4px;
      font-family: 'Inter', Arial, sans-serif;
      font-size: 11px;
      color: #404F54;
      opacity: 0.5;
      text-align: right;
      transform: translateY(50%);
      line-height: 1;
    }

    .plot-area {
      flex: 1;
      position: relative;
      height: 260px;
      border-bottom: 1px solid rgba(64,79,84,0.2);
    }

    .gridline {
      position: absolute;
      left: 0;
      right: 0;
      height: 1px;
      background: rgba(64,79,84,0.08);
      pointer-events: none;
    }

    .bars-row {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: flex-end;
      gap: 4px;
    }

    .col-wrap {
      flex: 1;
      height: 100%;
      display: flex;
      align-items: flex-end;
    }

    .col-fill {
      width: 100%;
      background: #23685b;
      border-radius: 2px 2px 0 0;
      min-height: 0;
      height: 0;
      transition: height 0.65s cubic-bezier(0.25, 0.46, 0.45, 0.94), opacity 0.15s;
      cursor: default;
    }

    .col-fill:hover {
      opacity: 0.82;
    }

    .x-axis {
      display: flex;
      gap: 4px;
      margin-top: 6px;
      padding-left: 38px;
    }

    .x-tick-label {
      flex: 1;
      text-align: center;
      font-family: 'Inter', Arial, sans-serif;
      font-size: 11px;
      color: #404F54;
      opacity: 0.6;
      line-height: 1;
    }

    .x-axis-title {
      text-align: center;
      font-family: 'Inter', Arial, sans-serif;
      font-size: 11px;
      font-weight: 500;
      color: #404F54;
      opacity: 0.45;
      margin-top: 10px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .viz-source {
      padding: 10px 20px 20px;
      font-family: 'Inter', Arial, sans-serif;
      font-size: 11px;
      color: #404F54;
      opacity: 0.5;
      line-height: 1.6;
    }
  </style>
</head>
<body>

  <div class="viz-container">

    <div class="viz-header">
      <div class="viz-kicker">Signal Cleveland</div>
      <div class="viz-heading">How long are suspensions?</div>
      <div class="viz-subheading">
        Here's how 785 cases that resulted in a suspension break down by length.
      </div>
    </div>

    <div class="chart-body" id="chart"></div>

    

  </div>

  <div class="bar-tooltip" id="tooltip">
    <span class="tt-title"></span>
    <span class="tt-detail"></span>
  </div>

  <script>
    const data = [
      { days: 1,  count: 197 },
      { days: 2,  count: 115 },
      { days: 3,  count: 70  },
      { days: 4,  count: 14  },
      { days: 5,  count: 33  },
      { days: 6,  count: 81  },
      { days: 7,  count: 30  },
      { days: 8,  count: 56  },
      { days: 9,  count: 8   },
      { days: 10, count: 71  },
      { days: 11, count: 1   },
      { days: 12, count: 5   },
      { days: 13, count: 15  },
      { days: 14, count: 8   },
      { days: 15, count: 26  },
      { days: 17, count: 3   },
      { days: 18, count: 3   },
      { days: 20, count: 21  },
      { days: 21, count: 6   },
      { days: 22, count: 1   },
      { days: 23, count: 1   },
      { days: 25, count: 10  },
      { days: 27, count: 1   },
      { days: 30, count: 9   },
    ];

    const BAR_COLOR = '#23685b';
    const Y_MAX     = 200;
    const TICKS     = [50, 100, 150, 200];
    const TOTAL     = 785;

    const chartBody = document.getElementById('chart');
    const tooltip   = document.getElementById('tooltip');

    // ── Chart area ──────────────────────────────────────────
    const chartArea = document.createElement('div');
    chartArea.className = 'chart-area';

    // Y-axis labels
    const yAxis = document.createElement('div');
    yAxis.className = 'y-axis';
    TICKS.forEach(t => {
      const lbl = document.createElement('div');
      lbl.className = 'y-tick-label';
      lbl.style.bottom = (t / Y_MAX * 100) + '%';
      lbl.textContent = t;
      yAxis.appendChild(lbl);
    });

    // Plot area + gridlines + bars
    const plotArea = document.createElement('div');
    plotArea.className = 'plot-area';

    TICKS.forEach(t => {
      const line = document.createElement('div');
      line.className = 'gridline';
      line.style.bottom = (t / Y_MAX * 100) + '%';
      plotArea.appendChild(line);
    });

    const barsRow = document.createElement('div');
    barsRow.className = 'bars-row';

    data.forEach(({ days, count }, i) => {
      const hPct = (count / Y_MAX * 100).toFixed(2);
      const col  = document.createElement('div');
      col.className = 'col-wrap';
      col.innerHTML = `<div class="col-fill"
        style="transition-delay:${i * 22}ms;"
        data-target="${hPct}%"
        data-days="${days}"
        data-count="${count}">
      </div>`;
      barsRow.appendChild(col);
    });

    plotArea.appendChild(barsRow);
    chartArea.appendChild(yAxis);
    chartArea.appendChild(plotArea);
    chartBody.appendChild(chartArea);

    // ── X-axis ──────────────────────────────────────────────
    const xAxis = document.createElement('div');
    xAxis.className = 'x-axis';
    data.forEach(({ days }) => {
      const lbl = document.createElement('div');
      lbl.className = 'x-tick-label';
      lbl.textContent = days;
      xAxis.appendChild(lbl);
    });
    chartBody.appendChild(xAxis);

    const xTitle = document.createElement('div');
    xTitle.className = 'x-axis-title';
    xTitle.textContent = 'Suspension length (days)';
    chartBody.appendChild(xTitle);

    // ── Scroll-triggered animation ───────────────────────────
    const fills = document.querySelectorAll('.col-fill');

    const observer = new IntersectionObserver(entries => {
      if (entries[0].isIntersecting) {
        // Double rAF ensures the browser has painted height:0 before transitioning
        requestAnimationFrame(() => {
          requestAnimationFrame(() => {
            fills.forEach(bar => {
              bar.style.height = bar.dataset.target;
            });
          });
        });
        observer.disconnect();
      }
    }, { threshold: 0.1 });

    observer.observe(xAxis);

    // ── Tooltips ─────────────────────────────────────────────
    document.querySelectorAll('.col-fill').forEach(bar => {
      bar.addEventListener('mousemove', e => {
        const days   = bar.dataset.days;
        const count  = bar.dataset.count;
        const label  = days == 1 ? '1 day' : `${days} days`;
        const plural = count == 1 ? 'case' : 'cases';
        const share  = ((count / TOTAL) * 100).toFixed(1);

        tooltip.querySelector('.tt-title').textContent = label;
        tooltip.querySelector('.tt-detail').textContent  =
          `${count} ${plural} — ${share}% of all suspensions`;

        const TT_W   = 220; // matches max-width in CSS
        const margin = 12;
        const rightEdge = e.clientX + 14 + TT_W + margin;
        const left = rightEdge > window.innerWidth
          ? e.clientX - TT_W - 14
          : e.clientX + 14;

        tooltip.style.left = Math.max(margin, left) + 'px';
        tooltip.style.top  = Math.max(8, e.clientY - 44) + 'px';
        tooltip.classList.add('visible');
      });

      bar.addEventListener('mouseleave', () => {
        tooltip.classList.remove('visible');
      });
    });
  </script>
<script>
/* Auto-height embed messaging (self-contained replacement for pym.js — NPR CDN retired) */
(function () {
  function postHeight() {
    var el = document.querySelector('.viz-container');
    var h = el ? Math.ceil(el.getBoundingClientRect().bottom + 32) : document.body.scrollHeight;
    window.parent.postMessage({ type: 'embed-height', height: h }, '*');
  }
  window.addEventListener('load', postHeight);
  window.addEventListener('resize', postHeight);
  setInterval(postHeight, 500);
})();
</script>

</body>
</html>
